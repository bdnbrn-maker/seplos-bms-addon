name: "Seplos BMS Monitor"
description: "Legge i dati dal BMS Seplos via RS485 / Waveshare WiFi e li pubblica su MQTT per Home Assistant."
version: "1.0.0"
slug: "seplos_bms"
url: "https://github.com/yourusername/seplos-bms-addon"
arch:
  - aarch64
  - amd64
  - armhf
  - armv7

# Accesso alla rete (necessario per TCP Waveshare e MQTT)
host_network: false

# Accesso ai dispositivi seriali USB (opzionale, solo se usi USB-RS485)
ports: {}
devices:
  - /dev/ttyUSB0
  - /dev/ttyUSB1

# Il broker MQTT interno di HA viene rilevato automaticamente
# grazie al servizio hassio
hassio_api: false
hassio_role: default

# Servizi HA disponibili all'add-on
services:
  - mqtt:need

options:
  # --- Connessione ---
  connection_mode: "waveshare"      # "waveshare" oppure "serial"
  waveshare_host: "192.168.1.100"
  waveshare_port: 4196
  tcp_timeout: 5
  serial_port: "/dev/ttyUSB0"
  baud_rate: 9600

  # --- BMS ---
  bms_address: 0

  # --- MQTT ---
  mqtt_host: "core-mosquitto"       # broker interno HA
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_password: ""
  mqtt_prefix: "seplos_bms"

  # --- Polling ---
  poll_interval: 10

  # --- Home Assistant ---
  ha_discovery: true
  ha_discovery_prefix: "homeassistant"

  # --- Log ---
  log_level: "info"

schema:
  connection_mode: "list(waveshare|serial)"
  waveshare_host: str
  waveshare_port: port
  tcp_timeout: int(1,30)
  serial_port: str
  baud_rate: "list(1200|2400|4800|9600|19200|38400|57600|115200)"

  bms_address: int(0,15)

  mqtt_host: str
  mqtt_port: port
  mqtt_user: str
  mqtt_password: str
  mqtt_prefix: str

  poll_interval: int(5,300)

  ha_discovery: bool
  ha_discovery_prefix: str

  log_level: "list(debug|info|warning|error)"

map:
  - config:rw
  - ssl:r

init: false
startup: "application"

# Restart automatico in caso di crash
watchdog: "tcp://localhost"
